# Pooled keep-alive connections to Kestrel. Without this, proxy_pass speaks
# HTTP/1.0 with Connection: close — one TCP handshake per proxied request,
# which exhausts ephemeral ports under load.
upstream api_backend {
    server api:8080;
    keepalive 256;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the static frontend.
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse-proxy the API so the browser sees a single origin (no CORS needed).
    # "api" is the container alias on the shared Docker network.
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
